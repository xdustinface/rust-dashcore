name: Update masternode seeds

# Refreshes the hardcoded masternode IP lists shipped in `dash-network-seeds`
# by connecting to the Dash P2P network, discovering a recent chain tip via a
# new-block announcement, issuing a `getmnlistd` request, and writing the
# resulting masternode IP list (differentiated by regular/evo type). Opens a
# pull request if any seed file changed.
#
# Runs fully self-contained: no RPC credentials or repository secrets needed.
# The fetcher bootstraps peers from DNS seeds and the existing seed files.

on:
  schedule:
    # Every Monday at 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Refresh masternode seed files
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "masternode-seeds-fetcher"

      - name: Build fetcher
        run: cargo build --release -p masternode-seeds-fetcher

      - name: Refresh mainnet seeds (with probes)
        env:
          RUST_LOG: info
        run: |
          ./target/release/masternode-seeds-fetcher \
            --network mainnet \
            --out dash-network-seeds/seeds/mainnet.txt \
            --max-peers 16 \
            --probe-concurrency 100

      - name: Refresh testnet seeds (with probes)
        env:
          RUST_LOG: info
        run: |
          ./target/release/masternode-seeds-fetcher \
            --network testnet \
            --out dash-network-seeds/seeds/testnet.txt \
            --max-peers 16 \
            --probe-concurrency 64

      - name: Verify parsed seed files still build
        run: cargo test -p dash-network-seeds --lib

      - name: Open pull request on change
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(dash-spv): refresh masternode seed files"
          title: "chore(dash-spv): refresh masternode seed files"
          body: |
            Weekly automated refresh of the hardcoded masternode IP lists
            embedded in `dash-spv` (`dash-network-seeds/seeds/mainnet.txt`,
            `dash-network-seeds/seeds/testnet.txt`).

            Generated by `.github/workflows/update-masternode-seeds.yml`
            via the `masternode-seeds-fetcher` crate, which fetches the
            current masternode list from the Dash P2P network using a
            `getmnlistd` request against a peer discovered through DNS
            seeds and the existing seed files.
          branch: chore/refresh-masternode-seeds
          delete-branch: true
          add-paths: |
            dash-network-seeds/seeds/mainnet.txt
            dash-network-seeds/seeds/testnet.txt
          labels: automated
