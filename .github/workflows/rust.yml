on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
  pull_request:

name: Continuous integration

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  msrv:
    name: MSRV Check (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.89
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace compiles on MSRV
        run: cargo check --workspace --all-features

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps

  verify-groups:
    name: Verify Test Groups
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pip install pyyaml
      - name: Verify group config and hardcoded matrix
        run: python .github/scripts/ci_config.py verify-groups

  test-ubuntu:
    name: Ubuntu
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: ubuntu-latest
      coverage: true
    secrets: inherit

  test-ubuntu-arm:
    name: Ubuntu ARM
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: ubuntu-22.04-arm

  test-macos:
    name: macOS
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: macos-latest

  test-windows:
    name: Windows
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: windows-latest

  integrations_tests:
    name: Integration Tests
    if: ${{ false }} # Temporarily disabled
    runs-on: ubuntu-22.04-arm
    strategy:
      matrix:
        rust: [stable]
        dashversion: ["22.1.3"]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Running test script
        env:
          DASHVERSION: ${{ matrix.dashversion }}
        run: ./contrib/test-rpc.sh
