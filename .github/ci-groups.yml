# Test group configuration for CI
# CI will fail if any workspace crate is not assigned to a group or excluded

groups:
  core:
    - dashcore
    - dashcore_hashes
    - dashcore-private
    - dash-network

  spv:
    - dash-spv
    - dash-network-seeds

  wallet:
    - key-wallet
    - key-wallet-manager

  ffi:
    - dash-spv-ffi
    - key-wallet-ffi

  rpc:
    - dashcore-rpc
    - dashcore-rpc-json

# Crates intentionally not tested (with reason)
excluded:
  - integration_test  # Requires live Dash node
  - dash-fuzz  # Honggfuzz binary targets, tested by fuzz.yml
  - masternode-seeds-fetcher  # Tooling binary; needs live dashd RPC, exercised by update-masternode-seeds.yml
  - git-state  # Compile-time proc-macro with no tests, exercised via dash-spv
