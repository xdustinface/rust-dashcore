language = "C"
header = "/* dash-spv-ffi C bindings - Auto-generated by cbindgen */"
include_guard = "DASH_SPV_FFI_H"
autogen_warning = "/* Warning: This file is auto-generated by cbindgen. Do not modify manually. */"
include_version = true
cpp_compat = true

[export]
include = ["FFI"]
exclude = ["Option_BlockCallback", "Option_TransactionCallback", "Option_BalanceCallback"]
prefix = ""

[export.body]
# Forward-declare FFIClientConfig to avoid aliasing to internal ClientConfig in C headers
"FFIClientConfig" = ""

[export.rename]
"FFIValidationMode" = "DashSpvValidationMode"
"FFIErrorCode" = "DashSpvErrorCode"

[fn]
prefix = ""
postfix = ""

[struct]
rename_fields = "None"

[enum]
rename_variants = "None"

[parse]
parse_deps = false
include = []

[macro_expansion]
bitflags = false
